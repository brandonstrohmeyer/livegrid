name: Deploy Dev

on:
  push:
    tags:
      - 'v*.*.*-rc.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing RC tag to deploy (for example v0.2.25-rc.1)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: firebase-development
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and Deploy Firebase Dev
    runs-on: ubuntu-latest
    environment: dev
    env:
      FIREBASE_PROJECT_ALIAS: ${{ vars.FIREBASE_PROJECT_ALIAS }}
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.VITE_FIREBASE_MEASUREMENT_ID }}
      VITE_FIREBASE_VAPID_KEY: ${{ vars.VITE_FIREBASE_VAPID_KEY }}
    steps:
      - name: Resolve deploy tag
        id: resolve
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            echo "Invalid RC tag: $TAG" >&2
            exit 1
          fi

          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.tag }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install Rollup Linux native binary
        run: npm install --no-save @rollup/rollup-linux-x64-gnu@$(node -p 'require("./node_modules/rollup/package.json").version')

      - name: Install functions dependencies
        run: npm --prefix functions ci

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Write Google service account credentials
        shell: bash
        run: |
          CREDENTIALS_PATH="${RUNNER_TEMP}/gcp-service-account.json"
          cat > "$CREDENTIALS_PATH" <<'EOF'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          EOF
          echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDENTIALS_PATH" >> "$GITHUB_ENV"

      - name: Install Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate Google Cloud CLI
        run: gcloud auth activate-service-account --key-file "$GOOGLE_APPLICATION_CREDENTIALS"

      - name: Write release build version
        run: node scripts/build-version.js set "${{ steps.resolve.outputs.version }}"

      - name: Validate Firebase client env vars
        run: node scripts/validate-firebase-env.mjs

      - name: Build frontend
        run: npm run build:ci

      - name: Build functions
        run: npm --prefix functions run build

      - name: Create deploy metadata
        shell: bash
        run: |
          node -e "const fs = require('fs'); const metadata = { tag: process.env.DEPLOY_TAG, version: process.env.DEPLOY_VERSION, sha: process.env.GITHUB_SHA, runId: process.env.GITHUB_RUN_ID, event: process.env.GITHUB_EVENT_NAME, deployedAt: new Date().toISOString(), environment: 'dev' }; fs.writeFileSync('deploy-metadata.json', JSON.stringify(metadata, null, 2) + '\n');"
        env:
          DEPLOY_TAG: ${{ steps.resolve.outputs.tag }}
          DEPLOY_VERSION: ${{ steps.resolve.outputs.version }}

      - name: Deploy hosting and functions
        run: firebase deploy --only functions,hosting --project "$FIREBASE_PROJECT_ALIAS" --non-interactive

      - name: Sync public access for Hosting-backed functions
        run: npm run firebase:postdeploy:public-routes -- --project "$FIREBASE_PROJECT_ID"

      - name: Verify public access for Hosting-backed functions
        run: npm run firebase:verify:public-routes -- --project "$FIREBASE_PROJECT_ID"

      - name: Remove legacy Sheets env overrides
        run: npm run firebase:cleanup:legacy-sheets-env -- --project "$FIREBASE_PROJECT_ID"

      - name: Verify Sheets runtime config
        run: npm run firebase:verify:sheets-runtime -- --project "$FIREBASE_PROJECT_ID"

      - name: Upload deploy artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deploy-dev-${{ steps.resolve.outputs.tag }}
          path: |
            dist
            functions/lib
            deploy-metadata.json
