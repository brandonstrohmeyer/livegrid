name: PR CI

on:
  pull_request:
    branches:
      - develop
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

env:
  CI: true

jobs:
  unit:
    name: Unit and Component Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install Rollup Linux native binary
        run: npm install --no-save @rollup/rollup-linux-x64-gnu@$(node -p 'require("./node_modules/rollup/package.json").version')

      - name: Run unit and component tests
        run: npm run test:run

  build:
    name: Build Validation
    runs-on: ubuntu-latest
    environment: prod
    env:
      VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.VITE_FIREBASE_MEASUREMENT_ID }}
      VITE_FIREBASE_VAPID_KEY: ${{ vars.VITE_FIREBASE_VAPID_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install Rollup Linux native binary
        run: npm install --no-save @rollup/rollup-linux-x64-gnu@$(node -p 'require("./node_modules/rollup/package.json").version')

      - name: Install functions dependencies
        run: npm --prefix functions ci

      - name: Validate frontend and functions builds
        run: npm run test:build

  integration:
    name: Emulator Integration Tests
    runs-on: ubuntu-latest
    environment: prod
    env:
      FIREBASE_PROJECT_ALIAS: ${{ vars.FIREBASE_PROJECT_ALIAS }}
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
      GCLOUD_PROJECT: ${{ vars.FIREBASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install root dependencies
        run: npm ci

      - name: Install Rollup Linux native binary
        run: npm install --no-save @rollup/rollup-linux-x64-gnu@$(node -p 'require("./node_modules/rollup/package.json").version')

      - name: Install functions dependencies
        run: npm --prefix functions ci

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Build functions
        run: npm --prefix functions run build

      - name: Run integration and rules tests
        env:
          LIVEGRID_TEST_MODE: true
          LIVEGRID_TEST_MESSAGING: stub
          LIVEGRID_TEST_FIXTURES_DIR: functions/test-fixtures
          FIRESTORE_EMULATOR_HOST: localhost:8080
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099
        run: firebase emulators:exec --project "$FIREBASE_PROJECT_ALIAS" --only functions,firestore,hosting,auth "npm run test:integration:inner"

  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    environment: prod
    env:
      FIREBASE_PROJECT_ALIAS: ${{ vars.FIREBASE_PROJECT_ALIAS }}
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.VITE_FIREBASE_MEASUREMENT_ID }}
      VITE_FIREBASE_VAPID_KEY: ${{ vars.VITE_FIREBASE_VAPID_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install root dependencies
        run: npm ci

      - name: Install Rollup Linux native binary
        run: npm install --no-save @rollup/rollup-linux-x64-gnu@$(node -p 'require("./node_modules/rollup/package.json").version')

      - name: Install functions dependencies
        run: npm --prefix functions ci

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build:ci

      - name: Build functions
        run: npm --prefix functions run build

      - name: Run E2E smoke tests
        env:
          VITE_USE_FIREBASE_EMULATORS: true
          VITE_FUNCTIONS_BASE_URL: http://localhost:5001/${{ vars.FIREBASE_PROJECT_ID }}/us-central1
          VITE_FIREBASE_EMULATOR_AUTH: http://localhost:9099
          VITE_FIREBASE_EMULATOR_FIRESTORE: localhost:8080
        run: firebase emulators:exec --project "$FIREBASE_PROJECT_ALIAS" --only functions,firestore,auth "playwright test"
