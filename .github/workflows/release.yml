name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Tag and Publish Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Ensure PAT available
        shell: bash
        run: |
          if [ -z "${{ secrets.RELEASE_PAT }}" ]; then
            echo "Missing RELEASE_PAT secret." >&2
            exit 1
          fi

      - name: Resolve promoted RC version
        id: version
        shell: bash
        run: |
          RC_TAG="$(node scripts/release-version.js latest-merged-rc-tag)"
          VERSION="$(node scripts/release-version.js final-from-merged-rc)"
          echo "source_rc_tag=$RC_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not already exist
        shell: bash
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists." >&2
            exit 1
          fi

      - name: Write release build version
        run: node scripts/build-version.js set "${{ steps.version.outputs.version }}"

      - name: Create annotated tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local --unset-all http.https://github.com/.extraheader || true
          git remote set-url origin "https://x-access-token:${{ secrets.RELEASE_PAT }}@github.com/${{ github.repository }}.git"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}" "${GITHUB_SHA}"
          git push origin "refs/tags/${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: gh release create "${{ steps.version.outputs.tag }}" --generate-notes --notes "Promoted from ${{ steps.version.outputs.source_rc_tag }}" --title "${{ steps.version.outputs.tag }}"
